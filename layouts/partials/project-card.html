<article class="project-card thumbnail">
  <img src="{{ .Params.cover_image | relURL }}" alt="{{ .Params.cover_alt }}" class="img-responsive" />
  <div class="caption">
    <h3>{{ .Title }}</h3>
    <p>{{ .Summary }}</p>
    <p><a class="btn btn-default" href="{{ .RelPermalink }}">Read project</a></p>
  </div>
</article>
